<svg width="680" height="520" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- User input -->
  <rect x="240" y="20" width="200" height="44" rx="8" fill="#f0eef8" stroke="#9990d4" stroke-width="0.5"/>
  <text x="340" y="46" text-anchor="middle" font-size="14" font-weight="500" fill="#3c3489">Developer query</text>

  <line x1="340" y1="64" x2="340" y2="100" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- DocuBot retrieve -->
  <rect x="190" y="104" width="300" height="56" rx="8" fill="#eeedfe" stroke="#7f77dd" stroke-width="0.5"/>
  <text x="340" y="126" text-anchor="middle" font-size="14" font-weight="500" fill="#26215c">DocuBot.retrieve()</text>
  <text x="340" y="148" text-anchor="middle" font-size="12" fill="#534ab7">Inverted index + term-overlap scoring</text>

  <!-- Docs folder -->
  <rect x="30" y="104" width="130" height="56" rx="8" fill="#f1efe8" stroke="#888780" stroke-width="0.5"/>
  <text x="95" y="126" text-anchor="middle" font-size="14" font-weight="500" fill="#2c2c2a">docs/ folder</text>
  <text x="95" y="148" text-anchor="middle" font-size="12" fill="#5f5e5a">.md files</text>
  <line x1="160" y1="132" x2="188" y2="132" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Score guardrail -->
  <rect x="520" y="104" width="140" height="56" rx="8" fill="#faeeda" stroke="#ba7517" stroke-width="0.5"/>
  <text x="590" y="126" text-anchor="middle" font-size="14" font-weight="500" fill="#412402">Score guardrail</text>
  <text x="590" y="148" text-anchor="middle" font-size="12" fill="#854f0b">Filter low scores</text>
  <line x1="490" y1="132" x2="518" y2="132" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <line x1="340" y1="160" x2="340" y2="198" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Top-K snippets -->
  <rect x="215" y="200" width="250" height="44" rx="8" fill="#e1f5ee" stroke="#1d9e75" stroke-width="0.5"/>
  <text x="340" y="226" text-anchor="middle" font-size="14" font-weight="500" fill="#04342c">Top-K snippets retrieved</text>

  <!-- Split left -->
  <line x1="215" y1="222" x2="150" y2="222" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="150" y1="222" x2="150" y2="288" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="150" y="270" text-anchor="middle" font-size="11" fill="#888">retrieval only</text>

  <!-- Split right -->
  <line x1="465" y1="222" x2="530" y2="222" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="530" y1="222" x2="530" y2="288" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="530" y="270" text-anchor="middle" font-size="11" fill="#888">RAG mode</text>

  <!-- Retrieval only output -->
  <rect x="60" y="290" width="180" height="56" rx="8" fill="#e1f5ee" stroke="#1d9e75" stroke-width="0.5"/>
  <text x="150" y="312" text-anchor="middle" font-size="14" font-weight="500" fill="#04342c">Raw snippets</text>
  <text x="150" y="334" text-anchor="middle" font-size="12" fill="#0f6e56">With source filenames</text>

  <!-- GeminiClient -->
  <rect x="430" y="290" width="200" height="56" rx="8" fill="#eeedfe" stroke="#7f77dd" stroke-width="0.5"/>
  <text x="530" y="312" text-anchor="middle" font-size="14" font-weight="500" fill="#26215c">GeminiClient</text>
  <text x="530" y="334" text-anchor="middle" font-size="12" fill="#534ab7">answer_from_snippets()</text>

  <line x1="530" y1="346" x2="530" y2="384" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Refusal check -->
  <rect x="430" y="386" width="200" height="56" rx="8" fill="#faeeda" stroke="#ba7517" stroke-width="0.5"/>
  <text x="530" y="408" text-anchor="middle" font-size="14" font-weight="500" fill="#412402">Refusal check</text>
  <text x="530" y="430" text-anchor="middle" font-size="12" fill="#854f0b">Refuse if evidence weak</text>

  <line x1="530" y1="442" x2="530" y2="468" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="150" y1="346" x2="150" y2="468" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="150" y1="470" x2="213" y2="490" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="530" y1="470" x2="467" y2="490" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Final output -->
  <rect x="215" y="468" width="250" height="44" rx="8" fill="#f1efe8" stroke="#888780" stroke-width="0.5"/>
  <text x="340" y="494" text-anchor="middle" font-size="14" font-weight="500" fill="#2c2c2a">Answer to developer</text>
</svg>
